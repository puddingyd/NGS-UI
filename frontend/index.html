<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NGS 三級分析 — Report Tool</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="topbar">
    <h1>NGS 三級分析</h1>
    <div class="topbar-actions"></div>
  </header>

  <main id="app" class="container">

    <!-- Search -->
    <section class="card">
      <div class="search-row">
        <label class="combobox-wrap">
          檢體編號 (LIS_ID / 姓名 / 病歷號)
          <input id="q-lis" type="text" autocomplete="off" placeholder="輸入以搜尋…" />
          <ul id="q-lis-dropdown" class="combobox-dropdown hidden"></ul>
        </label>
        <button id="btn-load" class="btn btn-primary">Load</button>
      </div>
      <div id="search-status" class="muted"></div>
    </section>

    <!-- Sample info -->
    <section id="sample-card" class="card hidden">
      <div class="sample-meta">
        <div><span class="label">LIS_ID</span><span id="m-lis"></span></div>
        <div><span class="label">Name</span><span id="m-name"></span></div>
        <div><span class="label">MRN</span><span id="m-mrn"></span></div>
        <div><span class="label">Test</span><span id="m-test"></span></div>
        <div>
          <span class="label">Category</span>
          <select id="m-category" class="meta-select"></select>
        </div>
        <div><span class="label">Generated</span><span id="m-generated"></span></div>
      </div>
    </section>

    <!-- Clinical presentation (free-text) -->
    <section id="clinical-card" class="card hidden">
      <div id="clinical-header" class="clinical-header">
        <span><span class="arrow"></span><span class="title">Clinical presentation</span></span>
      </div>
      <div id="clinical-body" class="clinical-body">
        <textarea id="clinical-text" rows="5" placeholder="病患的 clinical presentation..."></textarea>
      </div>
    </section>

    <!-- Patient phenotype + panels (editable) -->
    <section id="phenotype-card" class="card hidden">
      <div class="phenotype-header">
        <h2>Patient phenotype</h2>
        <span id="phenotype-stats" class="muted"></span>
      </div>

      <div class="phenotype-row">
        <label class="phenotype-label">HPO terms</label>
        <ul id="phenotype-list" class="phenotype-chips"></ul>
        <div class="hpo-add">
          <input id="hpo-search" type="text" placeholder="輸入 HPO 名稱或 HP:ID 搜尋…" autocomplete="off" />
          <select id="hpo-weight" title="Weight">
            <option value="1">w=1</option>
            <option value="2">w=2</option>
            <option value="3">w=3</option>
            <option value="4">w=4</option>
            <option value="5">w=5</option>
          </select>
          <ul id="hpo-search-dropdown" class="combobox-dropdown hidden"></ul>
        </div>
      </div>

      <div class="phenotype-row">
        <label class="phenotype-label">Custom panels</label>
        <ul id="panel-chips" class="phenotype-chips"></ul>
        <div class="hpo-add">
          <input id="panel-search" type="text" placeholder="輸入 panel 名稱搜尋（69 個可用）…" autocomplete="off" />
          <ul id="panel-search-dropdown" class="combobox-dropdown hidden"></ul>
        </div>
      </div>

      <div class="phenotype-actions">
        <button id="btn-recompute" class="btn btn-primary">⚡ 重新計算 in-house pheno_score</button>
        <button id="btn-rerun-tools" class="btn" disabled title="Phase C 才會啟用，會在 server 上重跑 Exomiser + LIRICAL（5–30 分）">▶ 重跑 Exomiser + LIRICAL</button>
        <span id="phenotype-hint" class="muted"></span>
      </div>

      <details id="phenotype-top10" class="phenotype-top10 hidden">
        <summary>Top 10 phenotype-matched genes</summary>
        <ol id="phenotype-top10-list"></ol>
      </details>
    </section>

    <!-- Comment (free-text; syncs to NGS_list.xlsx Comment column) +
         Tag picker (multi-select, syncs to NGS_list.xlsx Tag column) -->
    <section id="comment-card" class="card hidden">
      <div id="comment-header" class="clinical-header">
        <span><span class="arrow"></span><span class="title">Comment</span></span>
      </div>
      <div id="comment-body" class="clinical-body">
        <div class="comment-row-flex">
          <textarea id="comment-text" rows="3" placeholder="備註"></textarea>
          <div id="tag-picker" class="tag-picker"></div>
        </div>
      </div>
    </section>

    <!-- Report sections (marked variants) -->
    <section id="report-sections" class="report-sections hidden">
      <h2>Report</h2>
      <div id="sec-causative"  class="report-block" data-kind="report"   data-status="1"></div>
      <div id="sec-other"      class="report-block" data-kind="report"   data-status="2"></div>
      <div id="sec-acmg-sf"    class="report-block" data-kind="panel"    data-category="acmg_sf"></div>
      <div id="sec-proactive"  class="report-block" data-kind="panel"    data-category="proactive"></div>
      <div id="sec-carrier"    class="report-block" data-kind="panel"    data-category="carrier"></div>
      <div id="sec-pharmcat"   class="report-block" data-kind="pharmcat"></div>
      <div class="save-row">
        <button id="btn-save-top" class="btn btn-primary">💾 儲存變更</button>
        <button class="btn btn-export-html" title="產生靜態 HTML 並推到 output/analysis_html/">📄 匯出分析 HTML</button>
        <button class="btn btn-export-clinical" title="產生診斷報告 TXT 並推到 output/clinical_reports/">📋 匯出診斷報告</button>
        <button class="btn btn-export-screening" title="產生健檢報告 PDF 並推到 output/screening_reports/">🧬 匯出健檢報告</button>
        <span id="save-hint-top" class="muted"></span>
      </div>
    </section>

    <!-- Candidate category buttons -->
    <section id="category-sections" class="category-sections hidden">
      <div class="section-header">
        <h2>分析</h2>
        <label class="filter-toggle">
          <input id="filter-in-panel-only" type="checkbox" />
          <span>In panel only</span>
          <span id="in-panel-count" class="muted"></span>
        </label>
      </div>
      <div id="cat-tier-1a" class="cat-block tier-1a" data-tier="1A"></div>
      <div id="cat-tier-1b" class="cat-block tier-1b" data-tier="1B"></div>
      <div id="cat-tier-2"  class="cat-block tier-2"  data-tier="2"></div>
      <div id="cat-tier-3"  class="cat-block tier-3"  data-tier="3"></div>
      <div id="cat-tier-4"  class="cat-block tier-4"  data-tier="4"></div>
      <div id="cat-tier-5"  class="cat-block tier-5"  data-tier="5"></div>
      <div id="cat-acmg-sf-c"  class="cat-block" data-category="acmg_sf"></div>
      <div id="cat-proactive-c" class="cat-block" data-category="proactive"></div>
      <div id="cat-carrier-c"  class="cat-block" data-category="carrier"></div>
      <div id="cat-pharmcat-c" class="cat-block" data-category="pharmcat"></div>
      <div class="save-row">
        <button id="btn-close-bottom" class="btn">✕ Close</button>
        <button id="btn-save-bottom" class="btn btn-primary">💾 儲存變更</button>
        <button class="btn btn-export-html" title="產生靜態 HTML 並推到 output/analysis_html/">📄 匯出分析 HTML</button>
        <button class="btn btn-export-clinical" title="產生診斷報告 TXT 並推到 output/clinical_reports/">📋 匯出診斷報告</button>
        <button class="btn btn-export-screening" title="產生健檢報告 PDF 並推到 output/screening_reports/">🧬 匯出健檢報告</button>
        <span id="save-hint-bottom" class="muted"></span>
      </div>
    </section>

  </main>

  <!-- jsPDF (used by exportScreeningReport — Chinese font fetched on demand) -->
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
  <script type="module" src="./app.js"></script>
</body>
</html>
