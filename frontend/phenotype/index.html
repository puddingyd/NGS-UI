<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>輸入臨床表徵 (HPO / Panel)</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <h1>輸入臨床表徵 (HPO / Panel)</h1>
    <a href="/" class="btn btn-secondary">← 回分析系統</a>
  </header>

  <main id="app">
    <div id="loading-overlay">
      <div class="spinner"></div>
      <p>載入 HPO 資料中…</p>
    </div>

    <section class="card" id="patient-info-card">
      <div id="patient-info">
        <div class="field-group">
          <label for="patient-code">檢體編號</label>
          <input type="text" id="patient-code" placeholder="例：26WE0001">
        </div>
        <div class="field-group">
          <label for="patient-mrn">病歷號</label>
          <input type="text" id="patient-mrn" placeholder="例：12345678">
        </div>
        <div class="field-group field-group-btn">
          <label>&nbsp;</label>
          <button onclick="loadPatient()" class="btn btn-secondary" id="btn-load">載入既有資料</button>
        </div>
      </div>
      <p class="hint-line">檢體編號與病歷號至少填一個（兩個都填則檔名同時以兩者命名）。</p>
    </section>

    <section class="card">
      <h3 class="section-title">HPO Terms</h3>
      <section id="phenotype-rows"><!-- rows generated by JS --></section>
      <div id="row-controls">
        <button onclick="addRow()" class="btn btn-secondary">+ 新增 HPO 列</button>
      </div>
    </section>

    <section class="card">
      <h3 class="section-title">Gene Panels</h3>
      <section id="panel-rows"><!-- panel rows generated by JS --></section>
      <div id="panel-controls">
        <button onclick="addPanelRow()" class="btn btn-secondary">+ 新增 Panel 列</button>
      </div>
    </section>

    <section id="actions">
      <button onclick="generateFile()" class="btn btn-primary" id="btn-generate">產生 phenotype.txt</button>
      <button onclick="saveToServer()" class="btn btn-primary" id="btn-save" style="display:none;">存到伺服器</button>
      <button onclick="downloadFile()" class="btn btn-secondary" id="btn-download" style="display:none;">下載</button>
    </section>

    <div id="status-bar"></div>

    <section id="output-preview" class="card" style="display:none;">
      <h3 class="section-title">預覽</h3>
      <pre id="output-content"></pre>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
