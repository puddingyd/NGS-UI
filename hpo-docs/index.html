<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HPO Term Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>HPO Term Manager</h1>
      <div id="github-auth">
        <button id="btn-login" onclick="githubLogin()">Login with GitHub</button>
        <button onclick="setManualToken()" class="btn-small" title="Use Personal Access Token">Use Token</button>
        <span id="github-user" style="display:none;">
          <span id="github-username"></span>
          <button onclick="githubLogout()" class="btn-small">Logout</button>
        </span>
      </div>
    </header>

    <div id="loading-overlay">
      <div class="spinner"></div>
      <p>Loading HPO data...</p>
    </div>

    <section id="patient-info">
      <div class="field-group">
        <label for="patient-code">Code</label>
        <input type="text" id="patient-code" placeholder="e.g. 26WE0001">
      </div>
      <div class="field-group">
        <label for="patient-mrn">MRN</label>
        <input type="text" id="patient-mrn" placeholder="e.g. 12345678">
      </div>
      <div class="field-group field-group-btn">
        <label>&nbsp;</label>
        <button onclick="loadPatient()" class="btn-secondary" id="btn-load">Load from GitHub</button>
      </div>
    </section>

    <section id="phenotype-rows">
      <!-- Rows generated by JS -->
    </section>

    <div id="row-controls">
      <button onclick="addRow()" class="btn-secondary">+ Add Row</button>
    </div>

    <h3 class="section-title">Gene Panels</h3>
    <section id="panel-rows">
      <!-- Panel rows generated by JS -->
    </section>

    <div id="panel-controls">
      <button onclick="addPanelRow()" class="btn-secondary">+ Add Panel</button>
    </div>

    <section id="actions">
      <button onclick="generateFile()" class="btn-primary" id="btn-generate">Generate phenotype.txt</button>
      <button onclick="pushToGitHub()" class="btn-primary" id="btn-push" style="display:none;">Push to GitHub</button>
      <button onclick="downloadFile()" class="btn-secondary" id="btn-download" style="display:none;">Download</button>
    </section>

    <section id="output-preview" style="display:none;">
      <h3>Preview (VIP format)</h3>
      <pre id="output-content"></pre>
    </section>

    <section id="analysis-section" style="display:none;">
      <h3 class="section-title">Run Analysis</h3>
      <div id="gene-list-wrapper">
        <input type="text" id="gene-list-input" placeholder="Optional gene list, comma-separated (e.g. PTPN11, SOX6, VPS13D)">
      </div>
      <div id="analysis-buttons">
        <button onclick="triggerAnalysis('hg19')" class="btn-analysis btn-hg19">run-vcf hg19</button>
        <button onclick="triggerAnalysis('hg38')" class="btn-analysis btn-hg38">run-vcf hg38</button>
      </div>
      <div id="analysis-status"></div>
    </section>

    <div id="terminal-toggle">
      <button onclick="toggleTerminal()" class="btn-terminal-toggle">Terminal &#9654;</button>
    </div>
    <section id="terminal-section" style="display:none;">
      <div id="terminal-input-wrapper">
        <input type="text" id="terminal-input" placeholder="Enter command..." onkeydown="if(event.key==='Enter')sendTerminalCmd()">
        <button onclick="sendTerminalCmd()" class="btn-terminal-send">Send</button>
      </div>
      <div id="terminal-status"></div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
